<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deals Velocity - Before and After</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #111114;
      color: #f3ead9;
      font-family: Arial, sans-serif;
    }
    header {
      padding: 24px 32px 16px;
      border-bottom: 1px solid #3b3b40;
    }
    h1 { margin: 0 0 6px; font-size: 24px; }
    p { margin: 0; color: #b8b8bf; }
    main {
      display: grid;
      grid-template-columns: repeat(2, 851px);
      gap: 28px;
      width: max-content;
      padding: 28px 32px 40px;
    }
    figure { margin: 0; }
    figcaption {
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    img {
      display: block;
      width: 851px;
      height: auto;
      border: 1px solid #3b3b40;
    }
  </style>
</head>
<body>
  <header>
    <h1>Deals Velocity - Before and After</h1>
    <p>Same desktop state and normalized width; captures are top-aligned.</p>
  </header>
  <main>
    <figure>
      <figcaption>Before</figcaption>
      <img src="01-deal-feed-grid.png" alt="Deal feed before the UX implementation" />
    </figure>
    <figure>
      <figcaption>After</figcaption>
      <img src="02-deal-feed-after.png" alt="Deal feed after the UX implementation" />
    </figure>
  </main>
</body>
</html>
